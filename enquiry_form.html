    <body>

        <h1 class="mainheading">Enquiry Form</h1>

        <h2 style="text-align: center;">Fill the form below and we will get back to you ASAP!</h2>

        <form class="formbox">

            <b> Email: </b> <br>
            <input type="email" placeholder="ilovemen@gmail.com">
            <br> <br>
            <b>Phone Number: </b>
            <input type="text" placeholder="+60123456789">
            <br> <br>

            <b>Preferred way of communication: </b> <br> <br>

            Email <input type="checkbox" value="E-mail"> <br> 
            Phone Call<input type="checkbox" value="Phone Call">  <br>
            Whatsapp <input type="checkbox" value="Whatsapp"> <br> <br>

            <b> Your Enquiry: </b>
            <br>
            <textarea rows="5" placeholder="e.g. How often will you update your news feed?"></textarea>

            <input type="submit" class="buttons"> <input type="reset" class="buttons">
        </form>
