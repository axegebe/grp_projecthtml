<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="styling/enquiry_form.css">
        <script src="js/enquirysent.js" defer></script> <!--load js in bg as webpage loads-->
        <title>Billard Club Enquiry Form</title>
    </head>
    <body>

        <h1 class="mainheading">Enquiry Form</h1>

        <h2 style="text-align: center;" class="secondheading">Fill the form below and we will get back to you ASAP!</h2>

        
        <form class="formbox"  id="submitbutton"> <!--event listener only works on -->
            <label for="emailtext"> <b>Email:</b> </label> <br>
            <input type="email" id="emailtext" name="email" placeholder="ilovemen@gmail.com"> <br>
            <b>Phone Number: </b> <br>
            <input type="text" placeholder="+60123456789" name="phonenumber"> <br>

            <b>Preferred way of communication: </b> <br> <br>

            <label for="email">Email</label>
            <input type="checkbox" id="email" name="communication" value="E-mail">
            <label for="phonecall">Phone Call </label>
            <input type="checkbox" id="phonecall" name="communication" value="Phone Call">
            <label for="Whatsapp">Whatsapp</label>
            <input type="checkbox" id="Whatsapp" name="communication" value="Whatsapp"> <br> <br>

            <b> Your Enquiry: </b>
            <br>
            <textarea rows="5" placeholder="e.g. How often will you update your news feed?"></textarea> <br>

            <input type="submit" class="buttons"> <input type="reset" class="buttons">
            <h3 id="submitsuccess"></h3>
        </form>
        <br> <br>
        <h3 style="text-align: center;">Feeling impatient? Check out our <a href=FAQ/faq.html target="_blank" class="faqlink">FAQ!</a></h3>
