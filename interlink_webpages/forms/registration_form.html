<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0>
    <title>Registration Form</title>
    <script src=" https://kit.fontawesome.com/72de7666a8.js" crossorigin="anonymous">
    </script>
    <link rel="stylesheet" href="registration_form.css">
</head>

<body>
    <div class="main-container" <div class="container">
        <div class="nav-like">
            <div class="title">
                <h4>Registration Form</h4>
            </div>
            <div class="logo">
                <img src="formphotos/billardslogo.png" alt="billardslogo">
            </div>
        </div>
        <div class="parent">
            <div class="Form-Login" <div class="sub-title">
                <h5>Billard Registration Form
                    <p>Please Fill in the required information to register</p>
                </h5>
            </div>
            <div class="input-fields">
                <div class="first-name">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" placeholder="First Name">
                </div>
                <div class="last-name">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" placeholder="Last Name">
                </div>
                <div class="email">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Email">
                </div>
                <div class="phone-number">
                    <label for="phone-number">Phone Number</label>
                    <input type="text" id="phone-number" placeholder="Phone Number">
                </div>

                <div class="Age">
                    <label for="Age">Age</label>
                    <input type="text" id="Age" placeholder="Age">
                </div>
                <div class="gender">
                    <label for="gender">Gender</label>
                    <input type="text" id="gender" placeholder="Male/Female/">
                </div>

            </div>

            <div class="skill-level">
                <label for="skill-level">Skill Level</label>
                <p><input type="radio" name="radio" value="radio">Beginner</p>
                <p><input type="radio" name="radio" value="radio2">Intermediate</p>
                <p><input type="radio" name="radio" value="radio3">Advanced</p>
            </div>

            <tr style="position: relative;">
                <td><input type=submit></td>
                <td><input type=reset></td>
            </tr>
            </section>

        </div>
        <!--Test comment-->

</body>

</html>
